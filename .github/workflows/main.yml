name: Sync Fork with Upstream

on:
  schedule:
    # Her gün gece 00:00'da otomatik çalışır (CRON)
    - cron: '0 0 * * *'
  # Manuel çalıştırma butonu ekler
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with Upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/miantiao-me/Sink.git || true
          git fetch upstream
          git checkout master || git checkout main
          git merge upstream/master -m "auto: sync with upstream" || git merge upstream/main -m "auto: sync with upstream" || true
          git push origin HEAD
